    envelope:
      status: ok
      truncated: false
      data:
        found: true
        tx_hash: "{{case.tx_hash}}"
        confirmations: 0
        diagnosis_category: pending_or_unconfirmed

  - id: n3_provider_500
    kind: neo_n3
    provides_tools: [n3_get_raw_transaction]
    envelope:
      status: hard_error
      error_kind: provider_5xx
      truncated: false
      data:
        tx_hash: "{{case.tx_hash}}"

  - id: n3_address_balance
    kind: neo_n3
    provides_tools: [n3_get_nep17_balances]
    envelope:
      status: ok
      truncated: false
      data:
        valid_address: true
        balances:
          - symbol: NEO
            amount: "1"
          - symbol: GAS
            amount: "12.5"

  - id: n3_balances_truncated_with_attachment
    kind: neo_n3
    provides_tools: [n3_get_nep17_balances]
    envelope:
      status: ok
      truncated: true
      output_budget: 50
      attachment_ref: evidence://fixture/n3_balances_full
      data:
        valid_address: true
        preview_count: 50
        total_count: 125

  - id: n3_application_log_truncated_with_attachment
    kind: neo_n3
    provides_tools: [n3_get_application_log]
    envelope:
      status: ok
      truncated: true
      output_budget: 20
      attachment_ref: evidence://fixture/n3_application_log_full
      data:
        found: true
        tx_hash: "{{case.tx_hash}}"
        vm_state: HALT
        preview_notification_count: 20
        total_notification_count: 180

