tool_fixtures:
  - id: n3_success_tx
    kind: neo_n3
    provides_tools: [n3_get_raw_transaction, n3_get_application_log]
    envelope:
      status: ok
      truncated: false
      data:
        found: true
        tx_hash: "{{case.tx_hash}}"
        confirmations: 12
        vm_state: HALT
        diagnosis_category: success_halt

  - id: n3_fault_tx
    kind: neo_n3
    provides_tools: [n3_get_raw_transaction, n3_get_application_log]
    envelope:
      status: ok
      truncated: false
      data:
        found: true
        tx_hash: "{{case.tx_hash}}"
        confirmations: 3
        vm_state: FAULT
        exception: "Insufficient GAS fixture"
        diagnosis_category: fault_with_exception

  - id: n3_fault_without_clear_reason
    kind: neo_n3
    provides_tools: [n3_get_raw_transaction, n3_get_application_log]
    envelope:
      status: ok
      truncated: false
      data:
        found: true
        tx_hash: "{{case.tx_hash}}"
        vm_state: FAULT
        exception: null
        diagnosis_category: fault_without_clear_reason

  - id: n3_not_found
    kind: neo_n3
    provides_tools: [n3_get_raw_transaction]
    envelope:
      status: resolution_error
      error_kind: not_found
      truncated: false
      data:
        found: false
        tx_hash: "{{case.tx_hash}}"
        diagnosis_category: not_found

  - id: n3_pending_tx
    kind: neo_n3
