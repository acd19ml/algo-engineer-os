id: neo-official-support-agent
title: "Neo 官网智能客服 · 可验证链上支持 Agent"
type: work
status: in-progress

company: Neo 智能经济
domain: "Neo official website support"

business_problem: >
  Neo 官网原来没有独立客服入口，用户支持主要依赖 Discord 社区和全球开发者维护。
  官网入口需要产品化承接重复问题、官方资源导航、Neo N3 / Neo X 只读链上诊断、
  安全拦截和人工升级摘要，同时避免对官方地址、合约、bridge、交易状态和投资建议
  做错误背书。

product_scope:
  primary: "Neo 官网智能客服"
  included:
    - "Neo / Neo N3 / Neo X / NEO / GAS 官方解释"
    - "官方链接导航与安全链接校验"
    - "Neo N3 只读交易 / 地址查询"
    - "Neo X 只读交易 / 地址查询与 EVM 失败交易解释"
    - "安全拦截、投资建议拒答、人工升级摘要"
  excluded:
    - "交易所客服"
    - "第三方钱包内部问题"
    - "第三方 dApp 损失承担或资产追回承诺"
    - "任何写链、签名、授权、转账操作"
    - "价格预测、买卖建议、收益建议"

solution_thesis: >
  针对上述业务问题，技术方案不是泛 RAG bot，而是 policy-constrained support orchestrator。
  高风险、快变、可验证事实必须来自 Neo 官方 registry、Neo N3 / Neo X 链上只读工具、
  官方文档与公告；LLM 只负责意图理解、路由、证据解释与自然语言表达。

main_artifacts:
