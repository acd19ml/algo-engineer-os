legacy_context:
  note: >
    早期同名目录下的 working drafts（tmp/）已删除。
    本项目事实以 README.md、meta.yaml 与 docs/product/PRD.md 为准；
    policy-constrained orchestrator 是技术方案结论，不是业务问题本身。

source_of_truth_priority:
  - "Neo N3 / Neo X 链上只读 RPC、explorer、indexer"
  - "Neo 官方 registry：network、token、official link、contract、wallet、bridge、migration"
  - "Neo 官方 docs / developer docs / Neo X docs"
  - "Neo 官方公告、status、changelog"
  - "Evidence Bundle（运行时事实聚合；不创造新事实）"

non_source_layers:
  - "LLM answer compiler：只负责把 evidence 渲染成用户可读回答，不是事实源"
  - "interview/answers/*：只负责面试表达，不覆盖 source docs"

